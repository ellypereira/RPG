<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini RPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="topo">
      <h1>⚔️ Mini RPG de Batalha</h1>
      <p>Um projeto simples com foco em backend, API e banco de dados.</p>
    </header>

    <main class="grid">
      <section class="card">
        <h2>🧙 Criar Herói</h2>

        <label for="nome">Nome do jogador</label>
        <input type="text" id="nome" placeholder="Digite o nome do herói">

        <label for="classe">Classe</label>
        <select id="classe"></select>

        <button onclick="criarJogador()">Criar Jogador</button>
      </section>

      <section class="card">
        <h2>⚔️ Arena de Batalha</h2>

        <label for="jogador">Escolha o jogador</label>
        <select id="jogador"></select>

        <label for="inimigo">Escolha o inimigo</label>
        <select id="inimigo"></select>

        <button onclick="batalhar()">Lutar</button>

        <div id="resultadoBatalha" class="resultado">
          <p>Nenhuma batalha realizada ainda.</p>
        </div>
      </section>
    </main>

    <section class="card lista-card">
      <div class="titulo-linha">
        <h2>👥 Aventureiros</h2>
        <button onclick="listarJogadores()">Atualizar Lista</button>
      </div>

      <div id="listaJogadores" class="lista-jogadores"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
